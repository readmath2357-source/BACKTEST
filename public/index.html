<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFF Backtest — 자동 순차 시뮬레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg2:#111827;--card:#1a2035;--input:#0d1321;
  --border:#1e2a42;
  --text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;
  --accent:#f59e0b;--accent2:#d97706;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--cyan:#06b6d4;
  --blue:#3b82f6;--purple:#8b5cf6;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --r:8px;--r-lg:12px;
}
html{font-size:14px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topbar-logo{font-family:var(--mono);font-weight:700;font-size:1.3rem;color:var(--accent);letter-spacing:2px}
.topbar-logo span{font-size:.7rem;color:var(--muted);font-weight:400;letter-spacing:0}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:.65rem;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(245,158,11,.15);color:var(--accent);font-family:var(--mono)}
.topbar-limit{font-size:.65rem;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(239,68,68,.15);color:var(--red);font-family:var(--mono)}
.config{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.config-row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.config-row:last-child{margin-bottom:0}
.cfg{display:flex;flex-direction:column;gap:4px}
.cfg label{font-size:.65rem;color:var(--muted);text-transform:uppercase;font-family:var(--mono);letter-spacing:1px}
.cfg input,.cfg select{padding:8px 12px;background:var(--input);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.85rem}
.cfg input:focus,.cfg select:focus{border-color:var(--accent)}
.cfg-symbol input{width:200px;text-transform:uppercase;font-family:var(--mono)}
.cfg-date input{min-width:140px;color:var(--accent);border-color:rgba(245,158,11,.4)}
.cfg-small input{width:80px;font-family:var(--mono);text-align:right}
.cfg-symbol{position:relative}
.btn-run{padding:8px 24px;background:var(--accent);color:#000;font-weight:700;border-radius:var(--r);font-size:.9rem;height:37px}
.btn-run:hover{background:var(--accent2)}
.btn-run:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{padding:8px 16px;background:var(--red);color:#fff;font-weight:600;border-radius:var(--r);font-size:.85rem;height:37px;display:none}
.search-dropdown{position:absolute;top:100%;left:0;right:0;min-width:320px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);z-index:100;margin-top:4px;max-height:280px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.search-dropdown.visible{display:block}
.search-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:rgba(245,158,11,.08)}
.search-symbol{font-family:var(--mono);font-weight:600;font-size:.85rem;color:var(--accent);min-width:80px}
.search-name{font-size:.78rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-exchange{font-size:.6rem;color:var(--muted);font-family:var(--mono)}
.progress-section{padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:none}
.progress-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0}
.progress-text{font-size:.78rem;color:var(--text2);font-family:var(--mono)}
.progress-detail{font-size:.7rem;color:var(--muted);margin-top:4px}
.sec-title{font-size:.75rem;color:var(--accent);text-transform:uppercase;font-family:var(--mono);letter-spacing:1.5px;margin:20px 20px 10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.conditions-box{margin:0 20px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:none}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px}
.cond-item{font-size:.75rem;color:var(--text2)}.cond-item strong{color:var(--text);font-weight:500}
.stats-wrap{padding:0 20px;display:none}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center}
.stat-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;font-family:var(--mono);letter-spacing:.5px;margin-bottom:3px}
.stat-value{font-size:1.1rem;font-weight:700;font-family:var(--mono)}
.stat-sub{font-size:.6rem;color:var(--muted);margin-top:2px}
.v-pos{color:var(--green)}.v-neg{color:var(--red)}.v-neu{color:var(--accent)}.v-cyan{color:var(--cyan)}.v-purple{color:var(--purple)}
.charts-wrap{padding:0 20px;display:none}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.chart-box-title{font-size:.7rem;color:var(--text2);padding:10px 14px 0;font-family:var(--mono)}
#equityChart{width:100%;height:260px}
#ddChart{width:100%;height:120px}
.monthly-wrap{padding:0 20px;display:none;margin-bottom:16px}
.monthly-table{width:100%;border-collapse:collapse;font-size:.7rem;font-family:var(--mono)}
.monthly-table th{background:var(--bg2);color:var(--muted);padding:6px 8px;text-align:center;border:1px solid var(--border);font-weight:500}
.monthly-table td{padding:6px 8px;text-align:center;border:1px solid var(--border)}
.m-pos{background:rgba(34,197,94,.08);color:var(--green)}
.m-neg{background:rgba(239,68,68,.08);color:var(--red)}
.m-zero{color:var(--muted)}
.oos-wrap{padding:0 20px;display:none;margin-bottom:16px}
.oos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.oos-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.oos-card-title{font-size:.7rem;font-family:var(--mono);color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.oos-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.oos-stat{font-size:.75rem;color:var(--text2)}.oos-stat strong{color:var(--text)}
.log-wrap-outer{padding:0 20px 16px;display:none}
.log-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{background:var(--bg2);color:var(--muted);text-align:left;padding:7px 8px;font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(245,158,11,.03)}
.dir-long{color:var(--green);font-weight:600}.dir-short{color:var(--red);font-weight:600}
.exit-tp{color:var(--green)}.exit-sl{color:var(--red)}
.pnl-pos{color:var(--green);font-weight:600}.pnl-neg{color:var(--red);font-weight:600}
.disclaimer{padding:12px 20px;text-align:center;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border);background:var(--bg2);line-height:1.5}
@media(max-width:640px){.config-row{gap:6px}.cfg-symbol input{width:140px}.stats-grid{grid-template-columns:repeat(3,1fr)}.oos-grid{grid-template-columns:1fr}#equityChart{height:200px}#ddChart{height:90px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">RFF Backtest <span>자동 순차 시뮬레이션</span></div>
  <div class="topbar-right"><span class="topbar-badge">TSI · Fisher · ATR</span><span class="topbar-limit">최대 10회</span></div>
</div>
<div class="config">
  <div class="config-row">
    <div class="cfg cfg-symbol"><label>종목</label><input type="text" id="symbolInput" placeholder="심볼 검색" spellcheck="false" autocomplete="off"><div class="search-dropdown" id="searchDropdown"></div></div>
    <div class="cfg"><label>타임프레임</label><select id="tfSelect"><option value="1h">1시간</option><option value="4h">4시간</option><option value="1d" selected>일봉</option><option value="1wk">주봉</option></select></div>
    <div class="cfg cfg-date"><label>📅 시작일</label><input type="date" id="startDate"></div>
    <button class="btn-run" id="btnRun" onclick="startBacktest()">백테스트 실행</button>
    <button class="btn-stop" id="btnStop" onclick="stopBacktest()">중지</button>
  </div>
  <div class="config-row">
    <div class="cfg cfg-small"><label>초기 자본 (만원)</label><input type="number" id="initCapital" value="1000"></div>
    <div class="cfg cfg-small"><label>수수료 (%)</label><input type="number" id="commission" value="0.1" step="0.01"></div>
    <div class="cfg cfg-small"><label>슬리피지 (%)</label><input type="number" id="slippage" value="0.05" step="0.01"></div>
    <div class="cfg"><label>벤치마크</label><select id="benchmark"><option value="SPY">S&P 500 (SPY)</option><option value="^KS11">KOSPI</option><option value="QQQ">NASDAQ (QQQ)</option><option value="BTC-USD">비트코인</option></select></div>
  </div>
</div>
<div class="progress-section" id="progressSection"><div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div><div class="progress-text" id="progressText">준비 중...</div><div class="progress-detail" id="progressDetail"></div></div>
<div class="conditions-box" id="conditionsBox"></div>
<div class="stats-wrap" id="statsWrap"></div>
<div class="charts-wrap" id="chartsWrap"></div>
<div class="sec-title" id="monthlyTitle" style="display:none">월별 수익률</div>
<div class="monthly-wrap" id="monthlyWrap"></div>
<div class="sec-title" id="oosTitle" style="display:none">In-Sample vs Out-of-Sample</div>
<div class="oos-wrap" id="oosWrap"></div>
<div class="sec-title" id="logTitle" style="display:none">거래 상세 로그</div>
<div class="log-wrap-outer" id="logOuter"></div>
<div class="disclaimer">⚠️ <strong>투자 위험 고지</strong> — 본 백테스트는 과거 데이터 기반 AI 시뮬레이션이며 미래 수익을 보장하지 않습니다. 수수료·슬리피지는 단순 비율 차감이며 실제와 다를 수 있습니다.</div>

<script>
const API='/.netlify/functions';
const MAX_TRADES=10;
let running=false,cancelled=false,currentMarket='us_stock',searchTimeout=null,eqChart=null,ddChart=null;

(function(){const d=new Date();d.setMonth(d.getMonth()-6);document.getElementById('startDate').value=d.toISOString().split('T')[0];})();

// Search
const symInput=document.getElementById('symbolInput'),dropdown=document.getElementById('searchDropdown');
symInput.addEventListener('input',function(){clearTimeout(searchTimeout);const q=this.value.trim();if(q.length<1){dropdown.classList.remove('visible');return;}searchTimeout=setTimeout(()=>doSearch(q),300);});
symInput.addEventListener('keydown',e=>{if(e.key==='Escape')dropdown.classList.remove('visible');});
document.addEventListener('click',e=>{if(!e.target.closest('.cfg-symbol'))dropdown.classList.remove('visible');});

async function doSearch(q){
  dropdown.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.8rem;text-align:center">검색 중...</div>';dropdown.classList.add('visible');
  try{const r=await fetch(API+'/yahoo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'search',query:q})});const d=await r.json();
    if(!d.results?.length){dropdown.innerHTML='<div style="padding:12px;color:var(--muted);text-align:center;font-size:.8rem">결과 없음</div>';return;}
    dropdown.innerHTML=d.results.map(r=>`<div class="search-item" onclick="pickSymbol('${r.symbol}','${r.market}')"><span class="search-symbol">${r.symbol}</span><span class="search-name">${r.name}</span><span class="search-exchange">${r.exchange}</span></div>`).join('');
  }catch{dropdown.innerHTML='<div style="padding:12px;color:var(--muted)">실패</div>';}
}
function pickSymbol(s,m){symInput.value=s;currentMarket=m;dropdown.classList.remove('visible');}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const fmtP=v=>{if(v==null)return'—';return v>1000?Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:6});};
function setProgress(p,t,d){document.getElementById('progressBar').style.width=p+'%';document.getElementById('progressText').textContent=t;document.getElementById('progressDetail').textContent=d||'';}
function hideResults(){['conditionsBox','statsWrap','chartsWrap','monthlyWrap','oosWrap','logOuter'].forEach(id=>document.getElementById(id).style.display='none');['monthlyTitle','oosTitle','logTitle'].forEach(id=>document.getElementById(id).style.display='none');}

async function startBacktest(){
  const symbol=symInput.value.trim().toUpperCase(),tf=document.getElementById('tfSelect').value,startDate=document.getElementById('startDate').value;
  const mode='simple';
  const initCap=parseFloat(document.getElementById('initCapital').value)||1000;
  const commPct=parseFloat(document.getElementById('commission').value)||0,slipPct=parseFloat(document.getElementById('slippage').value)||0;
  const costPct=(commPct+slipPct)*2,benchSym=document.getElementById('benchmark').value;
  if(!symbol)return alert('종목을 입력하세요');if(!startDate)return alert('시작일을 선택하세요');

  running=true;cancelled=false;document.getElementById('btnRun').disabled=true;document.getElementById('btnStop').style.display='inline-block';
  document.getElementById('progressSection').style.display='block';hideResults();setProgress(0,'데이터 불러오는 중...','');

  try{
    const allCandles=await fetchCandles(symbol,currentMarket,tf);
    if(!allCandles||allCandles.length<50){setProgress(0,'데이터 부족',`${allCandles?.length||0}개`);finish();return;}

    const startUnix=new Date(startDate+'T00:00:00Z').getTime()/1000;
    let startIdx=allCandles.findIndex(c=>c.time>=startUnix);if(startIdx<0)startIdx=0;if(startIdx<30)startIdx=30;
    const totalBars=allCandles.length-startIdx;
    setProgress(0,`${totalBars}봉 시뮬레이션`,`${symbol} ${tf}`);

    const trades=[];let idx=startIdx,holdStreak=0;
    let dbgHold=0,dbgErr=0,dbgNoZone=0,dbgTotal=0;

    while(idx<allCandles.length-1&&!cancelled&&trades.length<MAX_TRADES){
      const pct=((idx-startIdx)/totalBars*100).toFixed(0);
      const dateStr=new Date(allCandles[idx].time*1000).toISOString().split('T')[0];
      setProgress(pct,`분석 ${trades.length+1}/${MAX_TRADES}`,`${dateStr} | ${trades.length}건 완료 | HOLD:${dbgHold} 에러:${dbgErr} 존없음:${dbgNoZone}`);

      const wStart=Math.max(0,idx-499),wCandles=allCandles.slice(wStart,idx+1);
      let analysis;
      try{analysis=await callAnalyze(wCandles,symbol,tf,mode);}catch(e){setProgress(pct,'API 오류 — 5초 후 재시도',e.message);await sleep(5000);continue;}
      dbgTotal++;
      if(!analysis||analysis.error){dbgErr++;idx++;continue;}

      if(analysis.direction==='HOLD'){dbgHold++;holdStreak++;idx+=holdStreak>=5?3:1;if(holdStreak>=5)holdStreak=0;continue;}
      holdStreak=0;

      const dir=analysis.direction,entryPrice=allCandles[idx].close,entryTime=allCandles[idx].time;
      let tpZone=analysis.tpZone;
      let slZone=analysis.slZone;
      if(!tpZone||!slZone){dbgNoZone++;idx++;continue;}

      let exitIdx=null,exitPrice=null,exitType=null;
      for(let j=idx+1;j<allCandles.length;j++){
        const c=allCandles[j];let tpHit=false,slHit=false;
        if(dir==='LONG'){if(c.high>=tpZone.low)tpHit=true;if(c.low<=slZone.high)slHit=true;}
        else{if(c.low<=tpZone.high)tpHit=true;if(c.high>=slZone.low)slHit=true;}
        if(tpHit&&slHit){exitIdx=j;exitPrice=dir==='LONG'?slZone.high:slZone.low;exitType='SL';break;}
        else if(tpHit){exitIdx=j;exitPrice=dir==='LONG'?tpZone.low:tpZone.high;exitType='TP';break;}
        else if(slHit){exitIdx=j;exitPrice=dir==='LONG'?slZone.high:slZone.low;exitType='SL';break;}
      }
      if(exitIdx===null){exitIdx=allCandles.length-1;exitPrice=allCandles[exitIdx].close;exitType='OPEN';}

      let rawPnl=dir==='LONG'?(exitPrice-entryPrice)/entryPrice*100:(entryPrice-exitPrice)/entryPrice*100;
      trades.push({num:trades.length+1,dir,entryTime,entryDate:new Date(entryTime*1000).toISOString().split('T')[0],
        entryPrice,exitTime:allCandles[exitIdx].time,exitDate:new Date(allCandles[exitIdx].time*1000).toISOString().split('T')[0],
        exitPrice,exitType,rawPnl:+rawPnl.toFixed(2),pnlPct:+(rawPnl-costPct).toFixed(2),bars:exitIdx-idx,confidence:analysis.confidence});
      idx=exitIdx+1;await sleep(1500);
    }

    if(trades.length===0){setProgress(100,'완료 — 거래 없음',`총 ${dbgTotal}회 분석: HOLD ${dbgHold}건, 에러 ${dbgErr}건, 존없음 ${dbgNoZone}건`);finish();return;}
    setProgress(100,`완료 — ${trades.length}건`,`분석 ${dbgTotal}회 (HOLD:${dbgHold} 에러:${dbgErr}) | 벤치마크 로드 중...`);

    let benchCandles=null;try{benchCandles=await fetchCandles(benchSym,'us_stock',tf);}catch{}
    let cum=0;trades.forEach(t=>{cum+=t.pnlPct;t._cum=+cum.toFixed(2);});
    displayAll(trades,allCandles,startIdx,benchCandles,benchSym,{symbol,tf,startDate,mode,initCap,commPct,slipPct,costPct});
  }catch(err){setProgress(0,'오류',err.message);}
  finish();
}
function stopBacktest(){cancelled=true;}
function finish(){running=false;document.getElementById('btnRun').disabled=false;document.getElementById('btnStop').style.display='none';}

async function fetchCandles(sym,mkt,tf){const r=await fetch(API+'/yahoo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:sym,market:mkt,timeframe:tf})});const d=await r.json();if(d.error)throw new Error(d.error);return d.candles||[];}
async function callAnalyze(candles,sym,tf,mode){const r=await fetch(API+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({candles,symbol:sym,timeframe:tf,mode})});return await r.json();}

// ═══ DISPLAY ═══
function displayAll(trades,candles,startIdx,benchCandles,benchSym,cfg){
  showConditions(trades,cfg);showStats(trades,candles,startIdx,benchCandles,benchSym,cfg);showCharts(trades);showMonthly(trades);showOOS(trades);showLog(trades);
}

function showConditions(trades,cfg){
  const box=document.getElementById('conditionsBox');box.style.display='block';
  box.innerHTML=`<div class="cond-grid">
    <div class="cond-item"><strong>종목:</strong> ${cfg.symbol}</div>
    <div class="cond-item"><strong>타임프레임:</strong> ${cfg.tf}</div>
    <div class="cond-item"><strong>테스트 기간:</strong> ${trades[0].entryDate} ~ ${trades[trades.length-1].exitDate}</div>
    <div class="cond-item"><strong>총 거래:</strong> ${trades.length}건 / ${MAX_TRADES}회 제한</div>
    <div class="cond-item"><strong>초기 자본:</strong> ${cfg.initCap.toLocaleString()}만원</div>
    <div class="cond-item"><strong>수수료:</strong> ${cfg.commPct}% (편도)</div>
    <div class="cond-item"><strong>슬리피지:</strong> ${cfg.slipPct}% (편도)</div>
    <div class="cond-item"><strong>왕복 비용:</strong> ${cfg.costPct.toFixed(2)}%</div>
    <div class="cond-item"><strong>전략:</strong> TSI(21,21,21)+TSI(13,13,13)+Fisher(9) / ATR(21)</div>
    <div class="cond-item"><strong>진입:</strong> TSI 시그널 + Fisher 조건 충족 시 종가 진입</div>
    <div class="cond-item"><strong>청산:</strong> ATR(21) TP×2 / SL×1.5</div>
  </div>`;
}

function showStats(trades,candles,startIdx,benchCandles,benchSym,cfg){
  const wrap=document.getElementById('statsWrap');wrap.style.display='block';
  const closed=trades.filter(t=>t.exitType!=='OPEN'),wins=closed.filter(t=>t.pnlPct>0),losses=closed.filter(t=>t.pnlPct<=0);
  const totalPnl=trades.reduce((s,t)=>s+t.pnlPct,0);
  const winRate=closed.length>0?(wins.length/closed.length*100).toFixed(1):'0';
  const avgPnl=trades.length>0?(totalPnl/trades.length).toFixed(2):'0';
  const avgWin=wins.length>0?(wins.reduce((s,t)=>s+t.pnlPct,0)/wins.length).toFixed(2):'0';
  const avgLoss=losses.length>0?(losses.reduce((s,t)=>s+Math.abs(t.pnlPct),0)/losses.length).toFixed(2):'0';
  const grossWin=wins.reduce((s,t)=>s+t.pnlPct,0),grossLoss=Math.abs(losses.reduce((s,t)=>s+t.pnlPct,0));
  const pf=grossLoss>0?(grossWin/grossLoss).toFixed(2):grossWin>0?'∞':'0';

  const firstT=trades[0].entryTime,lastT=trades[trades.length-1].exitTime;
  const years=(lastT-firstT)/(365.25*86400);
  const cumMult=trades.reduce((m,t)=>m*(1+t.pnlPct/100),1);
  const cagr=years>0.01?((Math.pow(cumMult,1/years)-1)*100).toFixed(2):'N/A';

  let peak=0,maxDD=0,c2=0;trades.forEach(t=>{c2+=t.pnlPct;if(c2>peak)peak=c2;const dd=peak-c2;if(dd>maxDD)maxDD=dd;});

  const returns=trades.map(t=>t.pnlPct),mean=returns.reduce((a,b)=>a+b,0)/returns.length;
  const variance=returns.reduce((s,r)=>s+(r-mean)**2,0)/returns.length,vol=Math.sqrt(variance);
  const sharpe=vol>0?(mean/vol*Math.sqrt(returns.length)).toFixed(2):'N/A';
  const downR=returns.filter(r=>r<0),downVar=downR.length>0?downR.reduce((s,r)=>s+(r-mean)**2,0)/downR.length:0;
  const sortino=Math.sqrt(downVar)>0?(mean/Math.sqrt(downVar)*Math.sqrt(returns.length)).toFixed(2):'N/A';

  let maxConsLoss=0,consLoss=0;closed.forEach(t=>{if(t.pnlPct<=0){consLoss++;if(consLoss>maxConsLoss)maxConsLoss=consLoss;}else consLoss=0;});
  const avgBars=(trades.reduce((s,t)=>s+t.bars,0)/trades.length).toFixed(1);

  let benchReturn='N/A',alpha='N/A';
  if(benchCandles?.length>0){
    const bS=benchCandles.find(c=>c.time>=firstT),bE=[...benchCandles].reverse().find(c=>c.time<=lastT);
    if(bS&&bE&&bS.close>0){const br=(bE.close-bS.close)/bS.close*100;benchReturn=br.toFixed(2);alpha=(totalPnl-br).toFixed(2);}
  }

  wrap.innerHTML=`
  <div class="sec-title">수익성 지표</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">총 수익률</div><div class="stat-value ${totalPnl>=0?'v-pos':'v-neg'}">${totalPnl>=0?'+':''}${totalPnl.toFixed(2)}%</div><div class="stat-sub">비용 차감 후</div></div>
    <div class="stat-card"><div class="stat-label">CAGR</div><div class="stat-value ${cagr!=='N/A'&&parseFloat(cagr)>=0?'v-pos':'v-neg'}">${cagr}%</div><div class="stat-sub">연환산</div></div>
    <div class="stat-card"><div class="stat-label">최종 자산</div><div class="stat-value v-neu">${(cfg.initCap*cumMult).toFixed(0)}만</div><div class="stat-sub">${cfg.initCap}만 시작</div></div>
    <div class="stat-card"><div class="stat-label">평균 수익</div><div class="stat-value ${parseFloat(avgPnl)>=0?'v-pos':'v-neg'}">${avgPnl}%</div><div class="stat-sub">건당</div></div>
  </div>
  <div class="sec-title">리스크 지표</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">최대 낙폭</div><div class="stat-value v-neg">-${maxDD.toFixed(2)}%</div><div class="stat-sub">MDD</div></div>
    <div class="stat-card"><div class="stat-label">샤프 비율</div><div class="stat-value v-cyan">${sharpe}</div><div class="stat-sub">Sharpe</div></div>
    <div class="stat-card"><div class="stat-label">소르티노</div><div class="stat-value v-cyan">${sortino}</div><div class="stat-sub">Sortino</div></div>
    <div class="stat-card"><div class="stat-label">변동성</div><div class="stat-value v-purple">${vol.toFixed(2)}%</div><div class="stat-sub">σ</div></div>
  </div>
  <div class="sec-title">거래 통계</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">총 거래</div><div class="stat-value v-neu">${trades.length}</div></div>
    <div class="stat-card"><div class="stat-label">승률</div><div class="stat-value ${parseFloat(winRate)>=50?'v-pos':'v-neg'}">${winRate}%</div><div class="stat-sub">${wins.length}W / ${losses.length}L</div></div>
    <div class="stat-card"><div class="stat-label">Profit Factor</div><div class="stat-value ${parseFloat(pf)>=1?'v-pos':'v-neg'}">${pf}</div></div>
    <div class="stat-card"><div class="stat-label">평균 TP</div><div class="stat-value v-pos">+${avgWin}%</div></div>
    <div class="stat-card"><div class="stat-label">평균 SL</div><div class="stat-value v-neg">-${avgLoss}%</div></div>
    <div class="stat-card"><div class="stat-label">최대 연속 손실</div><div class="stat-value v-neg">${maxConsLoss}회</div></div>
    <div class="stat-card"><div class="stat-label">평균 보유</div><div class="stat-value v-neu">${avgBars}봉</div></div>
  </div>
  <div class="sec-title">벤치마크 비교 (${benchSym})</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">전략 수익률</div><div class="stat-value ${totalPnl>=0?'v-pos':'v-neg'}">${totalPnl>=0?'+':''}${totalPnl.toFixed(2)}%</div></div>
    <div class="stat-card"><div class="stat-label">${benchSym}</div><div class="stat-value v-neu">${benchReturn!=='N/A'?(parseFloat(benchReturn)>=0?'+':'')+benchReturn+'%':benchReturn}</div><div class="stat-sub">동일 기간</div></div>
    <div class="stat-card"><div class="stat-label">초과수익 (α)</div><div class="stat-value ${alpha!=='N/A'&&parseFloat(alpha)>=0?'v-pos':'v-neg'}">${alpha!=='N/A'?(parseFloat(alpha)>=0?'+':'')+alpha+'%':alpha}</div></div>
  </div>`;
}

function showCharts(trades){
  const wrap=document.getElementById('chartsWrap');wrap.style.display='block';
  wrap.innerHTML='<div class="chart-box"><div class="chart-box-title">수익 곡선 (Equity Curve)</div><div id="equityChart"></div></div><div class="chart-box"><div class="chart-box-title">드로다운 구간</div><div id="ddChart"></div></div>';
  const tf=document.getElementById('tfSelect').value,isIntra=['1m','5m','15m','1h','4h'].includes(tf);
  const toT=t=>isIntra?t:Math.floor(t/86400)*86400;

  const eqC=document.getElementById('equityChart');
  eqChart=LightweightCharts.createChart(eqC,{width:eqC.clientWidth,height:260,layout:{background:{type:'solid',color:'#1a2035'},textColor:'#94a3b8',fontSize:11,fontFamily:'JetBrains Mono'},grid:{vertLines:{color:'#1e2a4222'},horzLines:{color:'#1e2a4222'}},rightPriceScale:{borderColor:'#1e2a42'},timeScale:{borderColor:'#1e2a42'},crosshair:{mode:0}});
  const eqLine=eqChart.addAreaSeries({topColor:'rgba(245,158,11,0.3)',bottomColor:'rgba(245,158,11,0.02)',lineColor:'#f59e0b',lineWidth:2});
  const eqMap=new Map();eqMap.set(toT(trades[0].entryTime),0);trades.forEach(t=>eqMap.set(toT(t.exitTime),t._cum));
  eqLine.setData(Array.from(eqMap).map(([time,value])=>({time,value})).sort((a,b)=>a.time-b.time));
  eqChart.timeScale().fitContent();
  new ResizeObserver(()=>eqChart.applyOptions({width:eqC.clientWidth})).observe(eqC);

  const ddC=document.getElementById('ddChart');
  ddChart=LightweightCharts.createChart(ddC,{width:ddC.clientWidth,height:120,layout:{background:{type:'solid',color:'#1a2035'},textColor:'#94a3b8',fontSize:10,fontFamily:'JetBrains Mono'},grid:{vertLines:{color:'#1e2a4222'},horzLines:{color:'#1e2a4222'}},rightPriceScale:{borderColor:'#1e2a42'},timeScale:{borderColor:'#1e2a42',visible:false},crosshair:{mode:0}});
  const ddLine=ddChart.addAreaSeries({topColor:'rgba(239,68,68,0.05)',bottomColor:'rgba(239,68,68,0.2)',lineColor:'#ef4444',lineWidth:1});
  let peak=0;const ddMap=new Map();let c2=0;
  trades.forEach(t=>{c2+=t.pnlPct;if(c2>peak)peak=c2;ddMap.set(toT(t.exitTime),-(peak-c2));});
  ddLine.setData(Array.from(ddMap).map(([time,value])=>({time,value})).sort((a,b)=>a.time-b.time));
  ddChart.timeScale().fitContent();
  new ResizeObserver(()=>ddChart.applyOptions({width:ddC.clientWidth})).observe(ddC);
}

function showMonthly(trades){
  document.getElementById('monthlyTitle').style.display='flex';
  const wrap=document.getElementById('monthlyWrap');wrap.style.display='block';
  const monthly={};trades.forEach(t=>{const ym=t.entryDate.substring(0,7);if(!monthly[ym])monthly[ym]=0;monthly[ym]+=t.pnlPct;});
  const yms=Object.keys(monthly).sort();if(!yms.length){wrap.innerHTML='';return;}
  const years=[...new Set(yms.map(ym=>ym.substring(0,4)))];
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  let h='<table class="monthly-table"><thead><tr><th>연도</th>';months.forEach(m=>h+=`<th>${parseInt(m)}월</th>`);h+='<th>합계</th></tr></thead><tbody>';
  years.forEach(y=>{h+=`<tr><td style="font-weight:600">${y}</td>`;let yt=0;
    months.forEach(m=>{const k=y+'-'+m,v=monthly[k];if(v!==undefined){yt+=v;h+=`<td class="${v>0?'m-pos':v<0?'m-neg':'m-zero'}">${v>=0?'+':''}${v.toFixed(1)}%</td>`;}else h+=`<td class="m-zero">—</td>`;});
    h+=`<td class="${yt>0?'m-pos':yt<0?'m-neg':'m-zero'}" style="font-weight:600">${yt>=0?'+':''}${yt.toFixed(1)}%</td></tr>`;});
  h+='</tbody></table>';wrap.innerHTML=h;
}

function showOOS(trades){
  if(trades.length<4)return;
  document.getElementById('oosTitle').style.display='flex';
  const wrap=document.getElementById('oosWrap');wrap.style.display='block';
  const sp=Math.ceil(trades.length*0.7),isT=trades.slice(0,sp),oosT=trades.slice(sp);
  function cs(a){if(!a.length)return{t:0,wr:0,pf:0,mdd:0,n:0};
    const t=a.reduce((s,x)=>s+x.pnlPct,0),w=a.filter(x=>x.pnlPct>0),l=a.filter(x=>x.pnlPct<=0);
    const wr=(w.length/a.length*100).toFixed(1),gw=w.reduce((s,x)=>s+x.pnlPct,0),gl=Math.abs(l.reduce((s,x)=>s+x.pnlPct,0));
    const pf=gl>0?(gw/gl).toFixed(2):gw>0?'∞':'0';let p=0,md=0,c=0;a.forEach(x=>{c+=x.pnlPct;if(c>p)p=c;const d=p-c;if(d>md)md=d;});
    return{t:t.toFixed(2),wr,pf,mdd:md.toFixed(2),n:a.length};}
  const a=cs(isT),b=cs(oosT);
  wrap.innerHTML=`<div class="oos-grid">
    <div class="oos-card"><div class="oos-card-title">In-Sample (${a.n}건)</div><div class="oos-stats">
      <div class="oos-stat"><strong>기간:</strong> ${isT[0]?.entryDate}~${isT[isT.length-1]?.exitDate}</div>
      <div class="oos-stat"><strong>수익률:</strong> <span class="${parseFloat(a.t)>=0?'v-pos':'v-neg'}">${a.t}%</span></div>
      <div class="oos-stat"><strong>승률:</strong> ${a.wr}%</div><div class="oos-stat"><strong>PF:</strong> ${a.pf}</div>
      <div class="oos-stat"><strong>MDD:</strong> -${a.mdd}%</div></div></div>
    <div class="oos-card" style="border-color:var(--cyan)"><div class="oos-card-title" style="color:var(--cyan)">Out-of-Sample (${b.n}건)</div><div class="oos-stats">
      <div class="oos-stat"><strong>기간:</strong> ${oosT[0]?.entryDate}~${oosT[oosT.length-1]?.exitDate}</div>
      <div class="oos-stat"><strong>수익률:</strong> <span class="${parseFloat(b.t)>=0?'v-pos':'v-neg'}">${b.t}%</span></div>
      <div class="oos-stat"><strong>승률:</strong> ${b.wr}%</div><div class="oos-stat"><strong>PF:</strong> ${b.pf}</div>
      <div class="oos-stat"><strong>MDD:</strong> -${b.mdd}%</div></div></div>
  </div><div style="font-size:.7rem;color:var(--muted);margin-top:8px;text-align:center">* ${trades.length}건 중 앞 ${sp}건 = In-Sample, 뒤 ${trades.length-sp}건 = Out-of-Sample</div>`;
}

function showLog(trades){
  document.getElementById('logTitle').style.display='flex';
  const o=document.getElementById('logOuter');o.style.display='block';
  o.innerHTML=`<div class="log-wrap"><table><thead><tr><th>#</th><th>진입일</th><th>방향</th><th>신뢰도</th><th>진입가</th><th>청산일</th><th>청산가</th><th>유형</th><th>수익률</th><th>누적</th><th>봉수</th></tr></thead>
  <tbody>${trades.map(t=>`<tr><td>${t.num}</td><td>${t.entryDate}</td><td class="${t.dir==='LONG'?'dir-long':'dir-short'}">${t.dir}</td>
    <td style="font-size:.65rem;color:var(--muted)">${t.confidence||'—'}</td><td style="font-family:var(--mono)">${fmtP(t.entryPrice)}</td>
    <td>${t.exitDate}</td><td style="font-family:var(--mono)">${fmtP(t.exitPrice)}</td>
    <td class="${t.exitType==='TP'?'exit-tp':t.exitType==='SL'?'exit-sl':''}">${t.exitType}</td>
    <td class="${t.pnlPct>=0?'pnl-pos':'pnl-neg'}">${t.pnlPct>=0?'+':''}${t.pnlPct}%</td>
    <td class="${t._cum>=0?'pnl-pos':'pnl-neg'}">${t._cum>=0?'+':''}${t._cum}%</td><td>${t.bars}</td></tr>`).join('')}</tbody></table></div>`;
}
</script>
